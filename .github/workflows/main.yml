name: Update IPTV Schedule

on:
  schedule:
    - cron: '0 10 * * 1'  # 每周一10点运行 (1-6表示周一到周六, 0/7是周日)
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  run_script:
    runs-on: ubuntu-latest  # 使用最新的Ubuntu运行器

    steps:
    - name: Checkout repository  # 检出代码库
      uses: actions/checkout@v4

    - name: Set up Python  # 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # 使用Python 3.11

    - name: Cache dependencies  # 缓存pip依赖项
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies  # 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install dependencies  # 安装demjson3
      run: |
        python -m pip install --upgrade pip
        pip install demjson3

    - name: Install Python dependencies  # 安装Python依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests aiohttp

    - name: Run Python script  # 执行主脚本
      run: |
        python main.py
        python fty.py

    - name: Commit and push if changed  # 如果有更改，则提交并推送
      run: |
        git config --local user.email "actions@163.com"
        git config --local user.name "GitHub Action Bot"
        git add .
        git commit -m "Auto-update live files" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/seal32/seal32.github.io.git master

    env:
      TZ: Asia/Shanghai  # 设置时区为上海
